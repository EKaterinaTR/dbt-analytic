version: "3.8"

# Аналитическая инфраструктура: PostgreSQL + Airflow.
# Подключение к MongoDB — через хост (порт 27017), т.к. MongoDB в отдельном compose (app/).

x-common-env: &common-env
  POSTGRES_USER: airflow
  POSTGRES_PASSWORD: airflow
  POSTGRES_DB: airflow
  # Airflow подключается к MongoDB на хосте (MongoDB запущен в app/ и слушает 27017)
  MONGODB_URI: "mongodb://root:example@host.docker.internal:27017/?authSource=admin"
  MONGODB_DB: sensors
  MONGODB_COLLECTION: measurements
  PG_HOST: postgres
  PG_PORT: "5432"
  PG_USER: airflow
  PG_PASSWORD: airflow
  PG_ANALYTICS_DB: analytics

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-analytics.sql:/docker-entrypoint-initdb.d/02-analytics.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: task_1-analytics-airflow:latest
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: 50000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: task_1-analytics-airflow:latest
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: 50000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: task_1-analytics-airflow:latest
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ""
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      AIRFLOW_UID: 50000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/variables_default.json:/opt/airflow/variables_default.json
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.org || true
      &&
      airflow variables import /opt/airflow/variables_default.json || true
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
