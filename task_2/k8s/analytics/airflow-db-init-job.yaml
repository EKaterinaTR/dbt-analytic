apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-db-init
  namespace: task2-analytics
  labels:
    app: airflow
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: airflow-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U airflow; do echo waiting for postgres; sleep 2; done; echo postgres ready"]
      containers:
        - name: airflow-init
          image: ghcr.io/ekaterinatr/dbt-analytic/task2-airflow:latest
          imagePullPolicy: Always
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__CORE__FERNET_KEY
              value: ""
            - name: AIRFLOW_UID
              value: "50000"
            - name: _AIRFLOW_WWW_USER_USERNAME
              value: admin
            - name: _AIRFLOW_WWW_USER_PASSWORD
              value: admin
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-config
          command:
            - bash
            - -c
            - |
              airflow db init && \
              airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.org || true && \
              airflow variables import /opt/airflow/variables_default.json || true
          volumeMounts:
            - name: variables
              mountPath: /opt/airflow/variables_default.json
              subPath: variables_default.json
      volumes:
        - name: variables
          configMap:
            name: airflow-variables
