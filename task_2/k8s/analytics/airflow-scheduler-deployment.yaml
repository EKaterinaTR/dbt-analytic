apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: task2-analytics
  labels:
    app: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      hostname: airflow-scheduler
      initContainers:
        - name: wait-for-db
          image: ghcr.io/ekaterinatr/dbt-analytic/task2-airflow:latest
          imagePullPolicy: Always
          command: ["bash", "-c", "until airflow db check 2>/dev/null; do echo waiting for airflow db; sleep 5; done; echo db ready"]
          envFrom:
            - secretRef:
                name: airflow-secret
        - name: copy-dags
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for f in /dags-config/*.py; do [ -f "$f" ] && cp -L "$f" /opt/airflow/dags/; done
              ls -la /opt/airflow/dags/
          volumeMounts:
            - name: dags-config
              mountPath: /dags-config
            - name: dags
              mountPath: /opt/airflow/dags
      containers:
        - name: scheduler
          image: ghcr.io/ekaterinatr/dbt-analytic/task2-airflow:latest
          imagePullPolicy: Always
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__CORE__FERNET_KEY
              value: ""
            - name: AIRFLOW_UID
              value: "50000"
          envFrom:
            - secretRef:
                name: airflow-secret
            - secretRef:
                name: airflow-web-secret
            - configMapRef:
                name: airflow-config
          command: ["bash", "-c", "airflow scheduler"]
          ports:
            - containerPort: 8793
              name: log-server
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: dags
          emptyDir: {}
        - name: dags-config
          configMap:
            name: airflow-dags
