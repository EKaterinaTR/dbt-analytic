apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: task2-analytics
  labels:
    app: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      initContainers:
        - name: wait-for-db
          image: your-registry/task2-airflow:latest
          imagePullPolicy: Always
          command: ["bash", "-c", "until airflow db check 2>/dev/null; do echo waiting for airflow db; sleep 5; done; echo db ready"]
          envFrom:
            - secretRef:
                name: airflow-secret
      containers:
        - name: scheduler
          image: your-registry/task2-airflow:latest
          imagePullPolicy: Always
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__CORE__FERNET_KEY
              value: ""
            - name: AIRFLOW_UID
              value: "50000"
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-config
          command: ["scheduler"]
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: dags
          configMap:
            name: airflow-dags
