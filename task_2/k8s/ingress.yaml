# Optional: Ingress for external access to Sensor API and Airflow UI.
# При деплое подставьте свой IP вместо __INGRESS_IP__ (через input в GitHub Actions или через sed локально).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task2-ingress
  namespace: task2-analytics
  annotations:
    # nginx example:
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: airflow.__INGRESS_IP__.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: airflow-webserver
                namespace: task2-analytics
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task2-app-ingress
  namespace: task2-app
  annotations: {}
spec:
  ingressClassName: nginx
  rules:
    - host: sensor-api.__INGRESS_IP__.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sensor-service
                namespace: task2-app
                port:
                  number: 8000
