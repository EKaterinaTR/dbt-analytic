apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-service
  namespace: task2-app
  labels:
    app: sensor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-service
  template:
    metadata:
      labels:
        app: sensor-service
    spec:
      containers:
        - name: sensor-service
          image: your-registry/task2-sensor:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: sensor-config
            - secretRef:
                name: sensor-secret
          command:
            - uvicorn
          args:
            - app.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      restartPolicy: Always
