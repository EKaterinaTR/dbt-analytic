# Secret for sensor-service MongoDB connection.
# Replace with your registry/credentials or use: kubectl create secret generic sensor-secret ...
# Example: kubectl create secret generic sensor-secret -n task2-app --from-literal=MONGODB_URI='mongodb://root:example@mongodb.task2-app.svc.cluster.local:27017/?authSource=admin'
apiVersion: v1
kind: Secret
metadata:
  name: sensor-secret
  namespace: task2-app
type: Opaque
stringData:
  MONGODB_URI: "mongodb://root:example@mongodb.task2-app.svc.cluster.local:27017/?authSource=admin"
