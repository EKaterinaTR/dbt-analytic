# Task 2: профиль для PostgreSQL analytics (Airflow использует те же креды)
dbt_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PG_HOST', 'localhost') }}"
      port: "{{ env_var('PG_PORT', '5432') | int }}"
      user: "{{ env_var('PG_USER', 'airflow') }}"
      password: "{{ env_var('PG_PASSWORD', 'airflow') }}"
      dbname: "{{ env_var('PG_ANALYTICS_DB', 'analytics') }}"
      schema: public
      threads: 2
      keepalives_idle: 0
    prod:
      type: postgres
      host: "{{ env_var('PG_HOST') }}"
      port: "{{ env_var('PG_PORT', '5432') | int }}"
      user: "{{ env_var('PG_USER') }}"
      password: "{{ env_var('PG_PASSWORD') }}"
      dbname: "{{ env_var('PG_ANALYTICS_DB', 'analytics') }}"
      schema: public
      threads: 4
