# Сборка образов и публикация в GitHub Container Registry (ghcr.io).
# Образы всегда в lowercase: ghcr.io/ekaterinatr/dbt-analytic/task2-sensor, task2-airflow

name: Build and push images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Явный строчный путь (GHCR требует lowercase)
  IMAGE_BASE: ghcr.io/ekaterinatr/dbt-analytic
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (sensor)
        id: meta-sensor
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/task2-sensor
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push sensor image
        uses: docker/build-push-action@v5
        with:
          context: ./task_2/app
          push: true
          tags: ${{ steps.meta-sensor.outputs.tags }}
          labels: ${{ steps.meta-sensor.outputs.labels }}

      - name: Extract metadata (airflow)
        id: meta-airflow
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/task2-airflow
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Airflow image
        uses: docker/build-push-action@v5
        with:
          context: ./task_2/analytics
          file: ./task_2/analytics/Dockerfile.airflow-k8s
          push: true
          tags: ${{ steps.meta-airflow.outputs.tags }}
          labels: ${{ steps.meta-airflow.outputs.labels }}
